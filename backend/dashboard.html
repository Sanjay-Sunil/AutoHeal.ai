<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aegis | Autonomous API Remediation</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel for JSX (Pinned stable version) -->
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <!-- PrismJS for Code Highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: 'Inter', sans-serif;
    }

    .log-enter {
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Custom scrollbar for terminal */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }
  </style>
</head>

<body className="h-screen flex flex-col overflow-hidden">
  <div id="root" className="h-full"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [logs, setLogs] = useState([]);
      const [code, setCode] = useState("");
      const [healedPayload, setHealedPayload] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [status, setStatus] = useState("idle"); // idle, error, healing, success

      // New states for GitOps PR integration
      const [isMerging, setIsMerging] = useState(false);
      const [mergeStatus, setMergeStatus] = useState(null);

      const terminalRef = useRef(null);

      // Auto-scroll terminal
      useEffect(() => {
        if (terminalRef.current) {
          terminalRef.current.scrollTop = terminalRef.current.scrollHeight;
        }
      }, [logs]);

      // Highlight code when it updates
      useEffect(() => {
        if (code && window.Prism) {
          Prism.highlightAll();
        }
      }, [code]);

      const triggerCheckout = () => {
        setLogs([]);
        setCode("");
        setHealedPayload(null);
        setMergeStatus(null); // Reset PR status on new run
        setIsProcessing(true);
        setStatus("idle");

        const eventSource = new EventSource('/api/checkout-stream');

        eventSource.onmessage = (event) => {
          const data = JSON.parse(event.data);

          if (data.step === 'done') {
            setIsProcessing(false);
            setStatus("success");
            eventSource.close();
            return;
          }

          setLogs(prev => [...prev, data]);

          if (data.step === 'error') setStatus("error");
          if (data.step === 'aegis_init') setStatus("healing");
          if (data.code) setCode(data.code);
          if (data.healed_payload) setHealedPayload(data.healed_payload);
        };

        eventSource.onerror = () => {
          setIsProcessing(false);
          eventSource.close();
        };
      };

      // Handler for the GitOps approval
      const handleMergePR = async () => {
        setIsMerging(true);
        try {
          const response = await fetch('/api/approve-pr', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: code })
          });

          const data = await response.json();
          if (response.ok) {
            setMergeStatus({ type: 'success', text: 'PR Opened successfully!', url: data.pr_url });
          } else {
            setMergeStatus({ type: 'error', text: 'Failed to create PR.' });
          }
        } catch (error) {
          setMergeStatus({ type: 'error', text: 'Server error. Is the backend running?' });
        } finally {
          setIsMerging(false);
        }
      };

      const getStatusColor = () => {
        if (status === "error") return "text-red-400 border-red-500 bg-red-950";
        if (status === "healing") return "text-amber-400 border-amber-500 bg-amber-950";
        if (status === "success") return "text-emerald-400 border-emerald-500 bg-emerald-950";
        return "text-slate-400 border-slate-700 bg-slate-800";
      };

      return (
        <div className="h-full flex flex-col">
          {/* Header */}
          <header className="border-b border-slate-800 bg-slate-900 px-6 py-4 flex justify-between items-center">
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 rounded bg-indigo-500 flex items-center justify-center font-bold text-white shadow-[0_0_15px_rgba(99,102,241,0.5)]">Æ</div>
              <h1 className="text-xl font-bold tracking-tight">Aegis Control Plane</h1>
            </div>
            <div className={`px-4 py-1.5 rounded-full border text-sm font-medium transition-colors ${getStatusColor()}`}>
              {status === "idle" && "System Standby"}
              {status === "error" && "Schema Drift Detected"}
              {status === "healing" && "Agentic Loop Active"}
              {status === "success" && "Pipeline Restored"}
            </div>
          </header>

          <div className="flex-1 flex overflow-hidden">
            {/* Left Panel: App Simulator */}
            <div className="w-1/3 border-r border-slate-800 p-6 flex flex-col bg-slate-900/50">
              <h2 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-6">Consumer App Simulator</h2>

              <div className="bg-slate-800 rounded-xl p-6 border border-slate-700 flex-1 flex flex-col justify-center shadow-xl">
                <div className="text-center mb-8">
                  <div className="inline-block p-4 bg-slate-700 rounded-full mb-4">
                    <svg className="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                  </div>
                  <h3 className="text-2xl font-bold mb-2">Premium Widget</h3>
                  <p className="text-slate-400">$99.00 USD</p>
                </div>

                <button
                  onClick={triggerCheckout}
                  disabled={isProcessing}
                  className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-600 text-white font-semibold py-4 rounded-lg transition-all transform active:scale-95 shadow-[0_0_20px_rgba(99,102,241,0.3)] disabled:shadow-none flex items-center justify-center gap-2"
                >
                  {isProcessing ? (
                    <><svg className="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing...</>
                  ) : (
                    "Checkout & Pay"
                  )}
                </button>
              </div>
            </div>

            {/* Right Panel: Aegis Telemetry */}
            <div className="w-2/3 flex flex-col p-6 gap-6 overflow-hidden">

              {/* Live Terminal */}
              <div className="flex-1 flex flex-col border border-slate-700 rounded-xl bg-slate-950 shadow-2xl overflow-hidden">
                <div className="bg-slate-800/80 px-4 py-2 border-b border-slate-700 flex items-center gap-2">
                  <div className="w-3 h-3 rounded-full bg-red-500"></div>
                  <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                  <div className="w-3 h-3 rounded-full bg-green-500"></div>
                  <span className="ml-2 text-xs font-mono text-slate-400">langgraph-agent.log</span>
                </div>
                <div ref={terminalRef} className="flex-1 p-4 overflow-y-auto font-mono text-sm leading-relaxed space-y-3">
                  {logs.length === 0 && <p className="text-slate-600 italic">Waiting for telemetry...</p>}
                  {logs.map((log, i) => (
                    <div key={i} className={`log-enter ${log.step.includes('error') ? 'text-red-400' : log.step.includes('success') ? 'text-emerald-400' : 'text-slate-300'}`}>
                      <span className="text-slate-500 mr-3">[{new Date().toLocaleTimeString()}]</span>
                      {log.msg}
                    </div>
                  ))}
                </div>
              </div>

              {/* Code Diff Viewer */}
              {code && (
                <div className="h-64 border border-slate-700 rounded-xl bg-slate-900 shadow-2xl overflow-hidden flex flex-col log-enter">
                  <div className="bg-slate-800/80 px-4 py-2 border-b border-slate-700 flex justify-between items-center">
                    <span className="text-xs font-mono text-amber-400">Auto-Generated PR Diff: integrators/stripe.py</span>
                    <div className="flex items-center gap-3">
                      {mergeStatus && (
                        <span className={`text-xs ${mergeStatus.type === 'error' ? 'text-red-400' : 'text-emerald-400'}`}>
                          {mergeStatus.text} {mergeStatus.url && <a href={mergeStatus.url} target="_blank" className="underline ml-1">View PR ↗</a>}
                        </span>
                      )}
                      <button
                        onClick={handleMergePR}
                        disabled={isMerging || mergeStatus?.type === 'success'}
                        className="bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-600 disabled:cursor-not-allowed text-white text-xs px-3 py-1 rounded transition-colors flex items-center gap-2"
                      >
                        {isMerging ? 'Pushing to GitHub...' : 'Approve & Merge PR'}
                      </button>
                    </div>
                  </div>
                  <div className="flex-1 overflow-auto p-0">
                    <pre className="!m-0 !bg-transparent !p-4 h-full text-sm"><code className="language-python">{code}</code></pre>
                  </div>
                </div>
              )}

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
